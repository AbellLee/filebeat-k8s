apiVersion: v1
kind: Pod
metadata:
  name: fbops-sidecar-smoke
  namespace: fbops-codex-smoke
  labels:
    app: fbops-sidecar-smoke
spec:
  restartPolicy: Never
  serviceAccountName: fbops-smoke
  containers:
    - name: control-sidecar
      image: localhost:5000/filebeat-ops-sidecar:codex-smoke
      imagePullPolicy: IfNotPresent
      command: ["sh", "-ec", "/usr/local/bin/control-sidecar; sleep 3600"]
      env:
        - name: CONTROL_SERVER_URL
          value: http://filebeat-control-server:8080
        - name: AGENT_TOKEN
          value: dev-agent-token
        - name: CLUSTER_ID
          value: dev
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_LABELS
          value: smoke=true
        - name: INPUTS_DIR
          value: /inputs
        - name: CONFIG_MODE
          value: poll
        - name: POLL_INTERVAL
          value: 1s
        - name: RUN_ONCE
          value: "true"
        - name: K8S_PROFILE
          value: auto
        - name: CONTAINER_FILE_MODE
          value: auto
        - name: KLOG_DIR
          value: /tmp/klog
        - name: KLOG_STDIO_DIR
          value: /tmp/klog-stdio
        - name: STDIO_LOG_DIR_CANDIDATES
          value: /var/log/containers,/hostfs/var/log/containers
        - name: CONTAINERD_STATE_DIR_CANDIDATES
          value: /run/k3s/containerd/io.containerd.runtime.v2.task/k8s.io,/run/containerd/io.containerd.runtime.v2.task/k8s.io,/var/run/containerd/io.containerd.runtime.v2.task/k8s.io,/data/container/state/io.containerd.runtime.v2.task/k8s.io
        - name: HOSTFS_DIR
          value: /hostfs
        - name: HOSTPROC_DIR
          value: /hostproc
      volumeMounts:
        - name: inputs
          mountPath: /inputs
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: hostfs
          mountPath: /hostfs
          readOnly: true
        - name: hostproc
          mountPath: /hostproc
          readOnly: true
  volumes:
    - name: inputs
      emptyDir: {}
    - name: varlog
      hostPath:
        path: /var/log
        type: Directory
    - name: hostfs
      hostPath:
        path: /
        type: Directory
    - name: hostproc
      hostPath:
        path: /proc
        type: Directory

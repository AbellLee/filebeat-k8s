apiVersion: v1
kind: Service
metadata:
  name: filebeat-control-server
spec:
  type: NodePort
  selector:
    app: filebeat-control-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 32733
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebeat-control-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: filebeat-control-server
  template:
    metadata:
      labels:
        app: filebeat-control-server
    spec:
      serviceAccountName: filebeat-ops
      containers:
        - name: control-server
          image: filebeat-ops-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: filebeat-ops-secret
                  key: database-url
            - name: AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: filebeat-ops-secret
                  key: agent-token
            - name: PORT
              value: "8080"
            - name: OPERATOR_ENABLED
              value: "false"
            - name: OPERATOR_CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: filebeat-ops-config
                  key: cluster-id
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20

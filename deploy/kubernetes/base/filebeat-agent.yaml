apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat-agent
spec:
  selector:
    matchLabels:
      app: filebeat-agent
  template:
    metadata:
      labels:
        app: filebeat-agent
    spec:
      serviceAccountName: filebeat-ops
      terminationGracePeriodSeconds: 30
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:9.4.1
          args: ["-e", "-c", "/usr/share/filebeat/filebeat.yml"]
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: filebeat-config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: dynamic-inputs
              mountPath: /usr/share/filebeat/inputs.d
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
            - name: hostproc
              mountPath: /hostproc
              readOnly: true
        - name: control-sidecar
          image: filebeat-ops-sidecar:local
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          env:
            - name: CONTROL_SERVER_URL
              value: http://filebeat-control-server:8080
            - name: AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: filebeat-ops-secret
                  key: agent-token
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: filebeat-ops-config
                  key: cluster-id
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INPUTS_DIR
              value: /usr/share/filebeat/inputs.d
            - name: CONFIG_MODE
              value: watch
            - name: WATCH_TIMEOUT
              value: 25s
            - name: POLL_INTERVAL
              value: 30s
            - name: K8S_PROFILE
              value: auto
            - name: CONTAINER_FILE_MODE
              value: auto
            - name: KLOG_DIR
              value: /var/log/klog
            - name: KLOG_STDIO_DIR
              value: /var/log/klog-stdio
            - name: STDIO_LOG_DIR_CANDIDATES
              value: /var/log/containers,/hostfs/var/log/containers
            - name: CONTAINERD_STATE_DIR_CANDIDATES
              value: /run/k3s/containerd/io.containerd.runtime.v2.task/k8s.io,/run/containerd/io.containerd.runtime.v2.task/k8s.io,/var/run/containerd/io.containerd.runtime.v2.task/k8s.io,/data/container/state/io.containerd.runtime.v2.task/k8s.io
            - name: HOSTFS_DIR
              value: /hostfs
            - name: HOSTPROC_DIR
              value: /hostproc
          volumeMounts:
            - name: dynamic-inputs
              mountPath: /usr/share/filebeat/inputs.d
            - name: varlog
              mountPath: /var/log
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
            - name: hostproc
              mountPath: /hostproc
              readOnly: true
      volumes:
        - name: filebeat-config
          configMap:
            name: filebeat-ops-config
        - name: dynamic-inputs
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: hostfs
          hostPath:
            path: /
            type: Directory
        - name: hostproc
          hostPath:
            path: /proc
            type: Directory
